services:
  db:
    image: postgres:16
    container_name: vhb_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: vhb
      POSTGRES_PASSWORD: vhb
      POSTGRES_DB: vhb
    ports:
      - "5432:5432"
    volumes:
      - vhb_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vhb -d vhb"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: vhb_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: vhb_minio
      MINIO_ROOT_PASSWORD: vhb_minio_secret
      MINIO_API_CORS_ALLOW_ORIGIN: http://localhost:3000
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - vhb_minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 vhb_minio vhb_minio_secret;
      mc mb --ignore-existing local/vhb-assets;
      "

  redis:
    image: redis:7.4-alpine
    container_name: vhb_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - vhb_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  vhb_pgdata:
  vhb_minio_data:
  vhb_redis_data:
