services:
  db:
    image: postgres:16
    container_name: vhb_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: vhb
      POSTGRES_PASSWORD: vhb
      POSTGRES_DB: vhb
    ports:
      - "5432:5432"
    volumes:
      - vhb_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vhb -d vhb"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  vhb_pgdata:
